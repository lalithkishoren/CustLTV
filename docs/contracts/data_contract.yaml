# Data Contract: Myntra Customer Lifetime Value (CLV) Analytics
# Version: 1.0.0
# Status: ACTIVE
# Policy: breaking_requires_signoff

domain: customer_analytics
owner:
  team: data_engineering_core
  email: data-eng-oncall@myntra.example.com
  slack_channel: "#data-ops-clv"

platform:
  cloud: azure
  catalog: unity_catalog
  database: gold_clv_analytics

service_level_agreement:
  freshness: "Daily by 06:00 UTC"
  availability: "99.9%"
  support_hours: "24/7"

datasets:
  - dataset: dim_customer
    description: "Conformed customer dimension with SCD Type 2 history tracking churn status."
    type: dimension
    update_frequency: daily
    partition_keys: []
    primary_keys: ["customer_sk"]
    schema:
      - name: customer_sk
        type: string
        description: "Surrogate key for customer record (MD5 hash of ID and valid_from)"
      - name: customer_id
        type: string
        description: "Natural key from Oracle CRM"
      - name: first_name
        type: string
        pii: true
        masked: true
      - name: last_name
        type: string
        pii: true
        masked: true
      - name: email
        type: string
        pii: true
        masked: true
      - name: status
        type: string
        description: "Active, Churned, or Suspended"
      - name: _valid_from
        type: timestamp
        description: "SCD2 start timestamp (based on event time)"
      - name: _valid_to
        type: timestamp
        description: "SCD2 end timestamp (based on event time)"
      - name: _is_current
        type: boolean
        description: "SCD2 current record flag"
      - name: _is_deleted
        type: boolean
        description: "Explicit delete marker from source"

  - dataset: fact_sales
    description: "Line-item level sales transactions."
    type: fact
    update_frequency: daily
    partition_keys: ["order_date"]
    primary_keys: ["order_line_id"]
    schema:
      - name: order_line_id
        type: string
        description: "Primary key for the order line"
      - name: order_id
        type: string
        description: "Header level order ID"
      - name: customer_sk
        type: string
        description: "Foreign key to dim_customer"
      - name: product_sk
        type: string
        description: "Foreign key to dim_product"
      - name: campaign_sk
        type: string
        description: "Foreign key to dim_campaign"
      - name: order_date
        type: date
        description: "Date the order was placed (Business Partition Key)"
      - name: total_amount
        type: decimal(18,2)
        description: "Total monetary value of the line item"
      - name: order_status
        type: string
        description: "Status of the order (e.g., Delivered)"

  - dataset: agg_customer_clv_metrics
    description: "Pre-calculated Customer Lifetime Value metrics per customer."
    type: aggregate
    update_frequency: daily
    partition_keys: []
    primary_keys: ["customer_id"]
    schema:
      - name: customer_id
        type: string
        description: "Natural key for customer"
      - name: average_order_value
        type: decimal(18,2)
        description: "SUM(TOTAL_AMOUNT) / COUNT(DISTINCT ORDER_ID)"
      - name: purchase_frequency
        type: decimal(10,4)
        description: "COUNT(DISTINCT ORDER_ID) / (DATEDIFF(day, MIN(ORDER_DATE), MAX(ORDER_DATE)) / 30.0)"
      - name: total_lifetime_revenue
        type: decimal(18,2)
        description: "Total revenue generated by the customer"
      - name: predicted_clv
        type: decimal(18,2)
        description: "ML-scored predicted future value"

  - dataset: agg_monthly_campaign_roi
    description: "Monthly aggregation of campaign performance and acquisition costs."
    type: aggregate
    update_frequency: daily
    partition_keys: ["reporting_month"]
    primary_keys: ["campaign_id", "reporting_month"]
    schema:
      - name: campaign_id
        type: string
        description: "Natural key for marketing campaign"
      - name: reporting_month
        type: date
        description: "First day of the reporting month"
      - name: total_spend
        type: decimal(18,2)
        description: "Total marketing spend for the campaign in the month"
      - name: customers_acquired
        type: integer
        description: "Number of new customers attributed to this campaign"
      - name: customer_acquisition_cost
        type: decimal(18,2)
        description: "SUM(TOTAL_SPEND) / NULLIF(SUM(CUSTOMERS_ACQUIRED), 0)"