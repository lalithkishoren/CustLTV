[pytest]
addopts = -v --strict-markers
markers =
    unit: Unit tests for individual transformations
    data_quality: Data quality and validation rules
    idempotency: Tests ensuring safe re-runs
    reconciliation: Source to target reconciliation tests
    integration: End-to-end integration tests
    contract: Schema and contract validation tests
    scd: Slowly Changing Dimension behavior tests
testpaths = tests