[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    spark: mark a test as requiring a Spark session
    integration: mark a test as an end-to-end integration test
    scd: mark a test for Slowly Changing Dimensions logic
    dq: mark a test for Data Quality rules
addopts = -v --tb=short --strict-markers